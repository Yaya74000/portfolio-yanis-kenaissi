<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yanis Kenaissi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(67, 56, 202, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Style des champs du formulaire */
        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #6366f1; /* Indigo 500 */
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500 selection:text-white p-4">

    <div class="ambient-glow"></div>

    <a href="index.html" class="fixed top-8 left-8 text-sm font-bold tracking-widest uppercase text-gray-400 hover:text-white transition-colors flex items-center gap-2">
        ← Retour au site
    </a>

    <div class="w-full max-w-2xl glass-panel rounded-[2rem] p-8 md:p-12 relative z-10">
        
        <div class="mb-10 text-center">
            <h1 class="text-4xl md:text-5xl font-black mb-2 font-['Outfit'] uppercase">Me Contacter</h1>
            <p class="text-gray-400">Parle-moi de ton projet.</p>
        </div>

        <form action="https://formsubmit.co/kenaissiyanis145@gmail.com" method="POST" class="space-y-6">
            
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="Nouveau prospect depuis ton site web !">
            <input type="hidden" name="_next" value="http://127.0.0.1:5500/merci.html">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold tracking-widest uppercase text-gray-400">Ton Nom / Entreprise</label>
                    <input type="text" name="name" required placeholder="Ex: Jean Dupont" class="w-full p-4 rounded-xl">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold tracking-widest uppercase text-gray-400">Ton Email</label>
                    <input type="email" name="email" required placeholder="jean@email.com" class="w-full p-4 rounded-xl">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold tracking-widest uppercase text-gray-400">Détails du projet</label>
                <textarea name="message" required rows="5" placeholder="J'ai besoin d'un site vitrine pour mon activité..." class="w-full p-4 rounded-xl resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl text-lg uppercase tracking-widest transition-all duration-300 shadow-[0_0_30px_rgba(79,70,229,0.4)] hover:shadow-[0_0_50px_rgba(79,70,229,0.7)] transform hover:-translate-y-1">
                Envoyer le message
            </button>

        </form>

    </div>

</body>
</html>
